# Build Linux (AppImage + tar.gz) and Windows (NSIS + portable) installers
# and publish a GitHub Release with those assets.
#
# Triggers:
#   1) Automatic: push an annotated tag matching v* (e.g. after ./scripts/release.sh && git push … v1.2.3).
#   2) Manual: Actions → Release → Run workflow → enter an existing tag (e.g. v1.2.3) to rebuild/re-upload.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build from (e.g. v1.0.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and create Linux installers
        run: npm run build && npx electron-builder --linux --publish never
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/*
          if-no-files-found: error
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and create Windows installers
        run: npm run build && npx electron-builder --win --publish never
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List release files
        run: find artifacts -type f -print
      
      - name: Delete existing release if present
        run: |
          gh release delete "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" -y --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
