# Build Linux (AppImage + tar.gz) and Windows (NSIS + portable) installers
# when an annotated version tag (v*) is pushed, then attach them to a GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and create Linux installers
        run: npm run build && npx electron-builder --linux --publish never
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/*
          if-no-files-found: error
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and create Windows installers
        run: npm run build && npx electron-builder --win --publish never
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List release files
        run: find artifacts -type f -print
      
      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
