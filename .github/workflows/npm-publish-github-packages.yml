# If you later add @scope/name + npm test + GPR publishing, replace this file with
# a real publish workflow.
name: Node.js Package (not used)

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: |
          echo "Electron releases use the \"Release\" workflow (push tag v* or Run workflow there)."
          exit 0
