<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translator</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Roboto", "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(145deg, #0d47a1 0%, #1565c0 35%, #1e88e5 70%, #42a5f5 100%);
        color: #fff;
        overflow: hidden;
        -webkit-app-region: drag;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        text-align: center;
      }
      .logo {
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.25);
        background: linear-gradient(90deg, #fff 0%, #e3f2fd 45%, #fff 90%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 2.2s ease-in-out infinite;
      }
      .ver {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        opacity: 0.85;
        letter-spacing: 0.02em;
      }
      .license {
        margin-top: 0.35rem;
        font-size: 0.68rem;
        opacity: 0.78;
        letter-spacing: 0.02em;
        max-width: 22rem;
        line-height: 1.35;
      }
      .ring {
        margin-top: 1.5rem;
        width: 44px;
        height: 44px;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }
      @keyframes shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash-root" class="wrap">
      <div id="splash-brand" class="logo">Translator</div>
      <div id="splash-tagline" class="sub">Loading editor…</div>
      <div id="splash-version" class="ver" aria-live="polite"></div>
      <div id="splash-license" class="license" aria-live="polite"></div>
      <div id="splash-spinner" class="ring" aria-hidden="true"></div>
    </div>
  </body>
</html>
